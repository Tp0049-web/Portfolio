<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Timothy Pham – Aerospace Portfolio</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #090c12;
      --text: #eaf0f8;
      --muted: #98a0b0;
      --brand: #5c87ff;
      --brand2: #8aa4ff;
      --border: rgba(255,255,255,0.08);
    }

    body {
      margin:0;
      font-family:'Inter',sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    header {
      position:sticky;
      top:0;
      background:#090c12;
      border-bottom:1px solid var(--border);
    }

    nav {
      max-width:1000px;
      margin:auto;
      padding:15px;
      display:flex;
      justify-content:space-between;
    }

    nav a {
      color:var(--muted);
      text-decoration:none;
      margin-left:15px;
    }

    nav a:hover {
      color:white;
    }

    .hero {
      text-align:center;
      padding:80px 20px;
    }

    .hero h1 {
      color:var(--brand2);
    }

    main {
      max-width:1000px;
      margin:auto;
      padding:20px;
    }

    section {
      margin-top:60px;
    }

    h2 {
      border-bottom:1px solid var(--border);
      padding-bottom:5px;
    }

    .card {
      border:1px solid var(--border);
      border-radius:10px;
      padding:15px;
      margin-bottom:15px;
      background:#12161b;

      /* FIX: always visible */
      opacity:1;
      transform:none;
    }

    .project-gallery {
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:15px;
      margin-top:10px;
    }

    .project-gallery img {
      width:100%;
      border-radius:10px;
    }

    footer {
      text-align:center;
      padding:30px;
      color:var(--muted);
      border-top:1px solid var(--border);
      margin-top:40px;
    }
  </style>
</head>

<body>

<header>
  <nav>
    <strong>Timothy Pham</strong>
    <div>
      <a href="#projects">Projects</a>
      <a href="#contact">Contact</a>
    </div>
  </nav>
</header>

<section class="hero">
  <h1>Timothy Pham</h1>
  <p>Aerospace Engineering – University of Michigan</p>
</section>

<main>

<section id="projects">
  <h2>Projects</h2>

  <div class="card">
    <h3>Hovercraft Design</h3>
    <p>Designed and built a hovercraft with propulsion, rudders, and payload mounts.</p>

    <div class="project-gallery">
      <img src="hovercraft_front.png">
      <img src="hovercraft_side.png">
    </div>
  </div>

</section>

<section id="contact">
  <h2>Contact</h2>
  <p>Email: timpham@umich.edu</p>
</section>

</main>

<footer>
  <p>© Timothy Pham</p>
</footer>

</body>
</html>
